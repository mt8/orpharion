name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install npm deps
        run: npm ci

      - name: Build UI bundle
        run: npm run build

      - name: Install composer deps (no-dev)
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: Stage plugin files
        run: |
          mkdir -p stage/optrion
          rsync -a ./ stage/optrion/ \
            --exclude-from=.distignore \
            --exclude='.git' \
            --exclude='stage'

      - name: Create zip archive
        working-directory: stage
        run: zip -r "optrion-${{ steps.version.outputs.version }}.zip" optrion

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: stage/optrion-${{ steps.version.outputs.version }}.zip
