name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpcs:
    name: PHPCS (WPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer lint

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    # We do not use `wordpress/plugin-check-action@v1` here. The action runs
    # `npm -g i @wordpress/env` without a version pin, so it always pulls the
    # latest @wordpress/env. The 11.7.0 release (2026-05-27) silently fails
    # `wp-env start` on GitHub-hosted runners (Docker containers never come
    # up; the next step fails with "Environment not initialized"). We inline
    # the action's steps and pin @wordpress/env to a known-good version.
    env:
      WP_ENV_VERSION: '11.6.0'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install deps and build
        run: |
          composer install --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader
          npm ci && npm run build

      - name: Prepare plugin directory
        run: |
          mkdir -p /tmp/plugin-check/orpharion
          rsync -a ./ /tmp/plugin-check/orpharion/ \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.husky' \
            --exclude='tests' \
            --exclude='.*' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpunit.xml.dist' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='package.json' \
            --exclude='composer.json'

      - name: Write .wp-env.json for Plugin Check
        run: |
          cat > .wp-env.json <<JSON
          {
            "core": null,
            "port": 8880,
            "testsPort": 8881,
            "plugins": [
              "https://downloads.wordpress.org/plugin/plugin-check.zip"
            ],
            "mappings": {
              "wp-content/plugins/orpharion": "/tmp/plugin-check/orpharion"
            }
          }
          JSON

      - name: Install pinned @wordpress/env
        run: npm -g --no-fund i "@wordpress/env@${WP_ENV_VERSION}"

      - name: Start wp-env
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          shell: bash
          command: wp-env start --update

      - name: Run Plugin Check
        run: |
          wp-env run cli wp cli info
          wp-env run cli wp plugin activate orpharion
          wp-env run cli wp plugin check orpharion \
            --format=json \
            --ignore-warnings \
            --require=./wp-content/plugins/plugin-check/cli.php

      - name: Stop wp-env
        if: always()
        run: wp-env stop || true

  phpunit:
    name: PHPUnit (WP ${{ matrix.wp }} / PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        wp: ['latest', '6.8']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install npm deps
        run: npm ci

      - name: Configure wp-env for matrix
        if: matrix.wp != 'latest'
        run: |
          echo '{"core":"WordPress/WordPress#${{ matrix.wp }}","phpVersion":"${{ matrix.php }}"}' > .wp-env.override.json

      - name: Configure wp-env PHP version (latest core)
        if: matrix.wp == 'latest'
        run: |
          echo '{"phpVersion":"${{ matrix.php }}"}' > .wp-env.override.json

      - name: Start wp-env
        run: npm run env:start

      - name: Run PHPUnit
        run: npm test

      - name: Stop wp-env
        if: always()
        run: npm run env:stop
